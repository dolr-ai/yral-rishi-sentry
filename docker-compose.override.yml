# =============================================================================
# yral-rishi-sentry — Docker Compose override
# =============================================================================
#
# Docker Compose auto-merges a file named `docker-compose.override.yml` on
# top of `docker-compose.yml` (they live side-by-side in
# ~/sentry-upstream/ on rishi-3). `scripts/install.sh` symlinks THIS
# file into that location so our overrides apply without modifying the
# upstream file (which we'd have to reconcile on every Sentry upgrade).
#
# What this file does:
#   1. Caps RAM for the heaviest services so Sentry can't OOM the
#      Patroni follower and etcd node sharing this host.
#
# What this file deliberately does NOT do:
#   - Bind nginx to loopback. Upstream already reads `$SENTRY_BIND` from
#     `.env.custom` (populated by scripts/install.sh) to build the port
#     spec. We set `SENTRY_BIND=127.0.0.1:9000` there, so the port is
#     already correct without a Compose-level override.
#
# IMPORTANT: every `services:` key below MUST be a REAL service name in
# upstream's docker-compose.yml at the pinned SENTRY_VERSION. If you add
# a service name that doesn't exist upstream, Compose creates a new
# service definition with no image and fails validation ("has neither an
# image nor a build context specified"). Upstream service names change
# across versions — example: `worker` and `cron` were renamed to
# `taskworker` and `taskscheduler` around tag 25. If you bump
# SENTRY_VERSION, re-check every name here against upstream's
# docker-compose.yml at the new tag.
#
# WHY not write resource limits into the upstream file directly? Upgrade
# safety. On every `scripts/upgrade.sh`, we bump `SENTRY_VERSION` in
# project.config, `git checkout <new-tag>` in ~/sentry-upstream, and
# the upstream docker-compose.yml gets REPLACED. If we'd edited it
# in-place, our limits would vanish silently. Putting them in an override
# file kept in OUR repo means upgrades never lose them.
#
# Values for memory caps come from project.config — see SENTRY_*_MEM
# entries there for rationale.
# =============================================================================

# Compose V2 — no top-level `version:` field.

services:

  # --------------------------------------------------------------------------
  # web — the Django app (Sentry UI + /api endpoints)
  # --------------------------------------------------------------------------
  web:
    mem_limit: 2g
    mem_reservation: 512m

  # --------------------------------------------------------------------------
  # taskworker — async task execution (replaces the old `worker` service
  # from tag < 25; post-ingest processing like issue grouping, alert
  # evaluation, integration webhooks)
  # --------------------------------------------------------------------------
  taskworker:
    mem_limit: 3g
    mem_reservation: 512m

  # --------------------------------------------------------------------------
  # taskscheduler — periodic job trigger (replaces the old `cron` service;
  # fires digest emails, retention cleanups, etc.)
  # --------------------------------------------------------------------------
  taskscheduler:
    mem_limit: 512m

  # --------------------------------------------------------------------------
  # taskbroker — message bus for tasks (pairs with taskworker)
  # --------------------------------------------------------------------------
  taskbroker:
    mem_limit: 512m

  # --------------------------------------------------------------------------
  # relay — event ingestion gateway; first stop for every incoming event
  # --------------------------------------------------------------------------
  relay:
    mem_limit: 512m

  # --------------------------------------------------------------------------
  # snuba-api — query layer in front of Clickhouse (all issue searches,
  # trends, performance UI hit here)
  # --------------------------------------------------------------------------
  snuba-api:
    mem_limit: 4g
    mem_reservation: 1g

  # --------------------------------------------------------------------------
  # clickhouse — time-series storage for events + traces
  # --------------------------------------------------------------------------
  clickhouse:
    mem_limit: 4g
    mem_reservation: 1g

  # --------------------------------------------------------------------------
  # kafka — event queue between relay and consumers
  # --------------------------------------------------------------------------
  kafka:
    mem_limit: 2g
    mem_reservation: 512m

  # --------------------------------------------------------------------------
  # postgres — Sentry's OWN Postgres (NOT our Patroni cluster). Stores
  # issue metadata, project config, user accounts.
  # --------------------------------------------------------------------------
  postgres:
    mem_limit: 2g
    mem_reservation: 512m

  # --------------------------------------------------------------------------
  # redis — cache + rate-limiter state
  # --------------------------------------------------------------------------
  redis:
    mem_limit: 512m

# We intentionally don't cap every single service — only the load-bearing
# ones. Upstream adds many "consumer" services (snuba-*-consumer, ingest-*,
# subscription-consumer-*, post-process-forwarder-*) and chasing each would
# mean maintenance pain on every release. They're small processes and share
# the uncapped remainder.
