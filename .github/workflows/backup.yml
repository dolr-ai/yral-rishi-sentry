# =============================================================================
# backup.yml — daily pg_dump of Sentry's internal Postgres to Hetzner S3
# =============================================================================
#
# WHAT THIS WORKFLOW DOES:
#   Once per day (3:00 AM UTC) this workflow:
#     1. SSHes to rishi-3 as the deploy user.
#     2. Runs `pg_dump` inside the Sentry Postgres container, capturing the
#        full Sentry schema + data as SQL.
#     3. Gzips the dump (Sentry's DB is small — few hundred MB at most in our
#        scale — so gzip on the fly is fine).
#     4. Uploads to Hetzner Object Storage at
#        s3://rishi-yral/yral-rishi-sentry/daily/sentry-YYYY-MM-DD_HHMMSS.sql.gz
#     5. Deletes dumps older than 7 days from the same S3 prefix.
#
# WHAT'S IN THE DUMP:
#   Sentry stores in Postgres: user accounts, organization/team/project
#   metadata, auth provider config, alert rules, DSN (project keys),
#   saved queries, issue assignees, release metadata. Event bodies /
#   transaction traces live in Clickhouse and are NOT in this dump.
#
# WHAT'S NOT IN THIS BACKUP (separate concerns):
#   - Clickhouse events / transactions. These can be re-generated from
#     Kafka replays within retention windows, or simply lost on
#     catastrophic failure — we accept this because event replay after
#     a prod outage isn't worth the operational cost. If you want
#     Clickhouse backups, see Phase 9 RUNBOOK for the weekly pattern.
#   - Kafka topic state. Ephemeral. Regenerated on restart.
#   - sentry-upstream config files (.env, .env.custom). Tracked in this
#     repo and/or generated by scripts/install.sh; secrets come from
#     GitHub Secrets. No separate backup needed.
#
# HOW TO RESTORE:
#   See scripts/restore.sh. The summary: download a specific dump from
#   S3, stop the Sentry stack, drop the Postgres DB, re-create it, pipe
#   the dump back in, restart the stack. Destructive — document in
#   RUNBOOK before performing.
#
# SCHEDULE:
#   3:00 AM UTC daily. Matches the template's backup.yml convention so
#   ops has a single "3 AM UTC is backup o'clock" mental model.
#
# RETENTION:
#   7 daily dumps (roughly a week). Weekly archival (Sunday at 3:00 AM)
#   keeps an additional 4 weeklies for ~1 month of coverage. That's
#   enough for "restore from yesterday" and "go back a few weeks" use
#   cases. Anything older than a month is probably not worth restoring
#   anyway — Sentry's operational data (issues, traces) ages quickly.
# =============================================================================

name: Daily Sentry DB backup

on:
  schedule:
    # Cron syntax: "minute hour day month weekday".
    # 0 3 * * *  = 03:00 UTC, every day
    - cron: '0 3 * * *'
  # Allow manual trigger for ad-hoc backups (e.g. before an upgrade).
  workflow_dispatch:

concurrency:
  group: sentry-backup
  cancel-in-progress: false  # do NOT cancel an in-progress backup — partial dumps are worse than no dumps

jobs:
  dump-and-upload:
    name: pg_dump → gzip → s3
    runs-on: ubuntu-latest
    # A full backup takes <5 min for our scale. 20 min cap is generous
    # but prevents runaway hangs (e.g. if pg_dump gets stuck on a lock).
    timeout-minutes: 20

    env:
      SENTRY_HOST: 136.243.147.225  # rishi-3; if this changes, update SENTRY_HOST_IP secret too and reference there
      S3_ENDPOINT: https://hel1.your-objectstorage.com
      S3_BUCKET: rishi-yral
      S3_PREFIX: yral-rishi-sentry/daily
      RETENTION_DAYS: '7'

    steps:
      - name: Check out this repo for backup script
        uses: actions/checkout@v4

      - name: Set up SSH key for deploy@rishi-3
        run: |
          mkdir -p ~/.ssh
          # The CI SSH key is the same one used across dolr-ai services.
          # chmod 600 or SSH refuses to use it.
          echo "${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}" > ~/.ssh/rishi_ci_key
          chmod 600 ~/.ssh/rishi_ci_key
          # Accept the host key automatically on first connection. Safe for
          # dedicated bare metal where the fingerprint is stable.
          ssh-keyscan -H "$SENTRY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run pg_dump over SSH, gzip on the fly
        id: dump
        run: |
          set -euo pipefail
          # UTC timestamp used in the S3 object name. Readable + sortable.
          TS="$(date -u +%Y-%m-%d_%H%M%S)"
          DUMP_FILE="sentry-${TS}.sql.gz"
          echo "DUMP_FILE=$DUMP_FILE" >> "$GITHUB_OUTPUT"

          # On rishi-3: docker compose exec into the sentry postgres
          # container, run pg_dump as the `postgres` user against the
          # `sentry` DB (upstream uses that fixed name). Output streams
          # back over SSH, we gzip on the runner side, save locally.
          #
          # Using `docker compose exec -T` (no TTY) so SSH can pipe stdin.
          # --no-tty flag on ssh to avoid pseudo-terminal allocation
          # which can mangle binary data.
          #
          # `|| kill $$` pattern: if pg_dump exits non-zero, the pipeline's
          # exit status is preserved by `set -o pipefail` above.
          ssh -o BatchMode=yes -i ~/.ssh/rishi_ci_key "deploy@${SENTRY_HOST}" \
            "cd /home/deploy/sentry-upstream && docker compose --env-file .env --env-file .env.custom exec -T postgres pg_dump -U postgres sentry" \
            | gzip -9 > "$DUMP_FILE"

          # Sanity check: dump file exists and is > 1 KB (a trivial pg_dump
          # of an empty DB still produces ~5 KB of schema DDL).
          SIZE=$(stat -c%s "$DUMP_FILE" 2>/dev/null || stat -f%z "$DUMP_FILE")
          echo "Dump size: ${SIZE} bytes"
          if [[ "$SIZE" -lt 1024 ]]; then
            echo "::error title=Backup too small::$DUMP_FILE is only $SIZE bytes — pg_dump likely failed."
            exit 1
          fi

      - name: Upload to Hetzner Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: hel1  # Hetzner uses regions named after their data centres
        run: |
          set -euo pipefail
          DUMP_FILE="${{ steps.dump.outputs.DUMP_FILE }}"
          # aws-cli is pre-installed on ubuntu-latest runners. The
          # --endpoint-url flag directs it at Hetzner Object Storage
          # instead of AWS S3. Hetzner implements the S3 API closely
          # enough that standard aws-cli commands work.
          aws s3 cp \
            --endpoint-url "$S3_ENDPOINT" \
            "$DUMP_FILE" \
            "s3://${S3_BUCKET}/${S3_PREFIX}/${DUMP_FILE}"

          echo "Uploaded to s3://${S3_BUCKET}/${S3_PREFIX}/${DUMP_FILE}"

      - name: Prune dumps older than ${{ env.RETENTION_DAYS }} days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: hel1
        run: |
          set -euo pipefail
          # Compute the cutoff date. GNU date on ubuntu-latest supports
          # `-d "N days ago"`. Output a YYYY-MM-DD string which we lex-
          # compare against the object name (our filenames start with
          # ISO date, so string < comparison works as date comparison).
          CUTOFF="$(date -u -d "${RETENTION_DAYS} days ago" +%Y-%m-%d)"
          echo "Cutoff: dumps before sentry-${CUTOFF}_* will be deleted"

          aws s3 ls \
            --endpoint-url "$S3_ENDPOINT" \
            "s3://${S3_BUCKET}/${S3_PREFIX}/" \
            | awk '{print $4}' \
            | grep -E '^sentry-[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{6}\.sql\.gz$' \
            | while read -r KEY; do
                # Extract the date portion (chars 8-17: YYYY-MM-DD).
                DATE="${KEY:7:10}"
                if [[ "$DATE" < "$CUTOFF" ]]; then
                  echo "  deleting $KEY (date=$DATE < cutoff=$CUTOFF)"
                  aws s3 rm \
                    --endpoint-url "$S3_ENDPOINT" \
                    "s3://${S3_BUCKET}/${S3_PREFIX}/${KEY}"
                fi
              done

          echo "Retention pruning complete."
